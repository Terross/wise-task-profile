spring:
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT} # postfix
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
    from-address: ${SMTP_RELAYHOST_USERNAME}
  application:
    name: wise-task-profile
  datasource:
    url: jdbc:postgresql://${DB}:5432/${PROFILE_DB}
    username: ${PROFILE_DB_USER}
    password: ${PROFILE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    generate-ddl: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

reset-password:
  recovery-link: "https://wisetask.ru/profile/reset_password?token="
  token-expires: 10
  send-limit: 2
  template: reset-password.html
  email-subject: "Ваша ссылка для восстановления пароля"

welcome:
  template: welcome.html

grpc:
  port: ${PROFILE_GRPC_PORT}
server:
  port: ${PROFILE_PORT}

logging:
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'
  level:
    ru.leti.wise.task.profile: ${LOGGING_LEVEL}
    org.hibernate: ${LOGGING_LEVEL}

management:
  tracing:
    sampling:
      probability: 1
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  zipkin:
    tracing:
      endpoint: http://${TEMPO_HOST}:${TEMPO_PORT}/api/v2/spans
